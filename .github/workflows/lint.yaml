name: Lint & Format Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-format-20

      - name: Install cmake-format
        run: pip install cmake-format

      - name: Check C/C++ formatting
        run: |
          find include src tests \
            -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' -o -name '*.c' \) \
            | xargs clang-format-20 --dry-run --Werror

      - name: Check CMake formatting
        run: |
          find . \
            -path ./thirdparty -prune -o \
            -path ./tools -prune -o \
            -path ./out -prune -o \
            -type f \( -name 'CMakeLists.txt' -o -name '*.cmake' \) -print \
            | xargs cmake-format --check

  lint-check:
    name: Clang-Tidy
    runs-on: ubuntu-latest

    env:
      CC: clang-20
      CXX: clang++-20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-20 clang-tidy-20 lld-20 cmake ninja-build \
            build-essential libgtk-3-dev libx11-xcb-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200

      - name: Generate compile_commands.json
        run: cmake --preset linux-amd64

      - name: Run clang-tidy on changed files
        run: |
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD \
            -- 'include/*.h' 'include/*.hpp' 'src/*.cpp' 'src/*.h' \
            || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No C/C++ files changed, skipping clang-tidy."
            exit 0
          fi

          echo "Running clang-tidy on changed files:"
          echo "$CHANGED_FILES"

          echo "$CHANGED_FILES" | xargs clang-tidy-20 \
            --config-file=.clang-tidy \
            -p out/build/linux-amd64 \
            --warnings-as-errors='*'
