name: Build rexglue-sdk linux ARM64

on:
  push:
    branches:
      - aarch64  # test aarch64
  pull_request:
    branches:
      - aarch64  # test pull resquest on this branch.

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # Runner native ARM64

    env:
      CC: clang-20
      CXX: clang++-20

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Clang 20 for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          
          # repo clang20 llvm
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-20 main"
          
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20

      - name: Update alternatives to use Clang 20
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200
          clang --version
          clang++ --version
          echo "Architecture: $(uname -m)"

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            ninja-build \
            build-essential \
            git \
            curl \
            unzip \
            autoconf \
            python3.12-venv \
            libgtk-3-dev \
            libx11-xcb-dev \
            libvulkan-dev \
            libasound2-dev \
            libpulse-dev
            
      - name: Create patch for SIMDe   
        run: |  
          mkdir -p patches
          cat > patches/simde-srli-epi64.patch << 'EOF'
          --- a/thirdparty/simde/simde/x86/sse2.h
          +++ b/thirdparty/simde/simde/x86/sse2.h
          @@ -6347,7 +6347,16 @@
           HEDLEY_DIAGNOSTIC_POP
           #elif defined(SIMDE_ARM_NEON_A32V7_NATIVE)
             #define simde_mm_srli_epi64(a, imm8) \
          -      vreinterpretq_m128i_u64(vshrq_n_u64(simde__m128i_to_neon_u64(a), ((imm8) & 63) | (((imm8) & 63) == 0))))
          +      __extension__ ({ \
          +        const int shift = ((imm8) & 63); \
          +        const int effective_shift = shift == 0 ? 64 : shift; \
          +        if (__builtin_constant_p(effective_shift)) { \
          +          vreinterpretq_m128i_u64(vshrq_n_u64(simde__m128i_to_neon_u64(a), effective_shift)); \
          +        } else { \
          +          uint64x2_t vec = simde__m128i_to_neon_u64(a); \
          +          vreinterpretq_m128i_u64(vshrq_u64(vec, vdupq_n_u64(effective_shift))); \
          +        } \
          +      })
           #elif defined(SIMDE_WASM_SIMD128_NATIVE)
             #define simde_mm_srli_epi64(a, imm8) (wasm_i64x2_shr(a, ((imm8) & 63) | (((imm8) & 63) == 0)))
           #else
          EOF

      - name: Apply SIMDe patch
        run: |
          cd thirdparty/simde
          patch -p2 < ../../patches/simde-srli-epi64.patch || echo "Patch already applied or failed - continuing anyway"
          cd ../..     
      - name: Configure (CMake preset for ARM64)
        run: cmake --preset linux-arm64

      - name: Make Install
        run: cmake --build out/build/linux-arm64 --target install -j$(nproc)

      - name: Verify ARM64 binary
        run: |
          file out/install/linux-arm64/bin/rexglue || true
          echo "Expected: ELF 64-bit LSB executable, ARM aarch64"

      - name: Upload build artifacts (for testing)
        uses: actions/upload-artifact@v4
        with:
          name: rexglue-sdk-linux-arm64
          path: out/install/linux-arm64
          retention-days: 90

      - name: Package install directory (for release)
        if: startsWith(github.ref, 'refs/tags/v')  #
        run: |
          cd out/install
          tar -czf rexglue-sdk-linux-arm64.tar.gz linux-arm64
          zip -r rexglue-sdk-linux-arm64.zip linux-arm64

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')  
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/install/rexglue-sdk-linux-arm64.tar.gz
            out/install/rexglue-sdk-linux-arm64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
