name: Build rexglue-sdk linux ARM64

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - aarch64-0.2

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        config: [Debug, Release, RelWithDebInfo]
      fail-fast: false

    env:
      CC: clang-20
      CXX: clang++-20

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Clang 20 for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common patch
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-20 main"
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20

      - name: Update alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200
          clang --version
          clang++ --version

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            ninja-build \
            build-essential \
            git \
            curl \
            unzip \
            autoconf \
            python3.12-venv \
            libgtk-3-dev \
            libx11-xcb-dev \
            libvulkan-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure (CMake multi-config preset)
        run: cmake --preset linux-arm64

      - name: Build ${{ matrix.config }}
        run: cmake --build out/build/linux-arm64 --config ${{ matrix.config }} --target install -j$(nproc)

      - name: Verify binary
        run: |
          echo "=== ${{ matrix.config }} binary ==="
          file out/install/linux-arm64/bin/rexglue* || file out/install/linux-arm64/${{ matrix.config }}/bin/rexglue
          echo "Expected: ELF 64-bit LSB executable, ARM aarch64"

      - name: Package ${{ matrix.config }}
        run: |
          cd out/install
          SUFFIX=""
          if [ "${{ matrix.config }}" = "Debug" ]; then SUFFIX="debug"; fi
          if [ "${{ matrix.config }}" = "Release" ]; then SUFFIX="release"; fi
          if [ "${{ matrix.config }}" = "RelWithDebInfo" ]; then SUFFIX="relwithdebinfo"; fi
          zip -r rexglue-sdk-linux-arm64-${SUFFIX}.zip linux-arm64

      - name: Upload ${{ matrix.config }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: rexglue-linux-arm64-${{ matrix.config }}
          path: out/install/rexglue-sdk-linux-arm64-*.zip
          retention-days: 90

      - name: Upload release asset (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/install/rexglue-sdk-linux-arm64-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}