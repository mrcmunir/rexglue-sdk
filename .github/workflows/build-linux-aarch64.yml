name: Build rexglue-sdk linux ARM64

on:
  push:
    branches:
      - aarch64
  pull_request:
    branches:
      - aarch64

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    env:
      CC: clang-20
      CXX: clang++-20

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Clang 20 for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common patch
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-20 main"
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20

      - name: Update alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200
          clang --version
          clang++ --version
          echo "Architecture: $(uname -m)"

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            ninja-build \
            build-essential \
            git \
            curl \
            unzip \
            autoconf \
            python3.12-venv \
            libgtk-3-dev \
            libx11-xcb-dev \
            libvulkan-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure (CMake preset for ARM64)
        run: cmake --preset linux-arm64

      - name: Build and Install
        run: cmake --build out/build/linux-arm64 --target install -j$(nproc)

      - name: Verify ARM64 binary
        run: |
          echo "=== Binary information ==="
          file out/install/linux-arm64/bin/rexglue-sdk || echo "Binary not found yet - may be named differently"
          echo "Expected: ELF 64-bit LSB executable, ARM aarch64"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rexglue-sdk-linux-arm64
          path: out/install/linux-arm64
          retention-days: 90

      - name: Package install directory (for release)
        if: startsWith(github.ref, 'refs/tags/v')  #
        run: |
          cd out/install
          tar -czf rexglue-sdk-linux-arm64.tar.gz linux-arm64
          zip -r rexglue-sdk-linux-arm64.zip linux-arm64

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')  
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/install/rexglue-sdk-linux-arm64.tar.gz
            out/install/rexglue-sdk-linux-arm64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
